name: 'integration-tests.yml'
run-name: 'Integration Tests'

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Integration
        run: task integration-tests
