name: 'build.yml'
run-name: 'Build and Test'

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Build
        run: task build

      - name: Test
        run: task test
